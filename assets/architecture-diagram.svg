<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="platformfill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#3B82F6"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#0B1220"/>
  <text x="600" y="36" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#F1F5F9">System Architecture</text>

  <!-- Left actor nodes -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#E2E8F0">
    <g transform="translate(40,80)">
      <rect width="170" height="60" rx="12" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <text x="85" y="36" text-anchor="middle" font-weight="600">Students</text>
    </g>
    <g transform="translate(40,160)">
      <rect width="170" height="60" rx="12" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <text x="85" y="36" text-anchor="middle" font-weight="600">Faculty</text>
    </g>
    <g transform="translate(40,240)">
      <rect width="170" height="60" rx="12" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <text x="85" y="36" text-anchor="middle" font-weight="600">Parents</text>
    </g>
    <g transform="translate(40,320)">
      <rect width="170" height="60" rx="12" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <text x="85" y="36" text-anchor="middle" font-weight="600">Administrators</text>
    </g>
  </g>

  <!-- Connector lines: actors -> platform -->
  <g stroke="#3B82F6" stroke-width="1.6" opacity="0.7" marker-end="url(#arrow)">
    <path d="M210 110 H 440" fill="none"/>
    <path d="M210 190 H 440" fill="none"/>
    <path d="M210 270 H 440" fill="none"/>
    <path d="M210 350 H 440" fill="none"/>
  </g>

  <!-- Platform node -->
  <g transform="translate(450,140)">
    <rect width="280" height="180" rx="20" fill="url(#platformfill)" stroke="url(#brand)" stroke-width="2"/>
    <text x="140" y="40" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#F1F5F9">CampusOne</text>
    <text x="140" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#93C5FD">Platform Core</text>
    <line x1="40" y1="80" x2="240" y2="80" stroke="#1E293B"/>
    <text x="140" y="104" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#94A3B8">Unified API layer</text>
    <text x="140" y="124" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#94A3B8">Business logic &amp; rules</text>
    <text x="140" y="144" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#94A3B8">Real-time sync engine</text>
  </g>

  <!-- Connector lines: platform -> services -->
  <g stroke="#3B82F6" stroke-width="1.6" opacity="0.7" marker-end="url(#arrow)">
    <path d="M730 180 H 960" fill="none"/>
    <path d="M730 260 H 960" fill="none"/>
    <path d="M730 340 H 960" fill="none"/>
  </g>

  <!-- Right service nodes -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#E2E8F0">
    <g transform="translate(970,150)">
      <rect width="190" height="60" rx="12" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <text x="95" y="36" text-anchor="middle" font-weight="600">Firebase Cloud</text>
    </g>
    <g transform="translate(970,230)">
      <rect width="190" height="60" rx="12" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <text x="95" y="36" text-anchor="middle" font-weight="600">Authentication</text>
    </g>
    <g transform="translate(970,310)">
      <rect width="190" height="60" rx="12" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <text x="95" y="36" text-anchor="middle" font-weight="600">Cloud Storage</text>
    </g>
  </g>

  <text x="600" y="470" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#475569">
    All traffic is encrypted in transit and authenticated at the platform boundary.
  </text>
</svg>

<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0E1830"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.35"/>
    </pattern>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="440" fill="url(#bg)"/>
  <rect width="1200" height="440" fill="url(#grid)"/>
  <circle cx="180" cy="90" r="220" fill="url(#glowA)"/>
  <circle cx="1040" cy="360" r="260" fill="url(#glowA)"/>

  <!-- Logo mark -->
  <g transform="translate(540,56)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#0B1220" stroke="url(#brand)" stroke-width="2"/>
    <g filter="url(#softGlow)" opacity="0.9">
      <path d="M44 22 C40 16, 30 14, 22 18 C10 24, 6 38, 12 48 C18 58, 32 62, 42 56 C46 54, 49 51, 51 47"
            fill="none" stroke="url(#brand)" stroke-width="5" stroke-linecap="round"/>
    </g>
    <path d="M44 22 C40 16, 30 14, 22 18 C10 24, 6 38, 12 48 C18 58, 32 62, 42 56 C46 54, 49 51, 51 47"
          fill="none" stroke="url(#brand)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="166" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#F1F5F9" letter-spacing="0.5">
    Campus<tspan fill="#3B82F6">One</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="206" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#94A3B8" letter-spacing="2">
    ONE PLATFORM. EVERY CAMPUS.
  </text>

  <!-- Divider -->
  <rect x="540" y="232" width="120" height="3" rx="1.5" fill="url(#brand)"/>

  <!-- Value proposition -->
  <text x="600" y="270" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#CBD5E1">
    The unified, cloud-native operating system for modern educational institutions.
  </text>

  <!-- Bottom meta row -->
  <text x="600" y="400" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#475569" letter-spacing="1">
    ENTERPRISE EDTECH · CLOUD INFRASTRUCTURE · SECURE BY DESIGN
  </text>
</svg>

<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="shieldglow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="#0B1220"/>
  <rect x="2" y="2" width="1196" height="376" rx="18" fill="none" stroke="#1E293B" stroke-width="1.5"/>

  <text x="600" y="50" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#F1F5F9">Security &amp; Trust</text>

  <!-- center shield -->
  <circle cx="600" cy="200" r="120" fill="url(#shieldglow)"/>
  <path d="M600 100 L660 124 V196 C660 240 632 268 600 282 C568 268 540 240 540 196 V124 Z"
        fill="#111A2E" stroke="url(#brand)" stroke-width="3"/>
  <path d="M578 196 L595 213 L626 174" fill="none" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- left labels -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#E2E8F0" text-anchor="end">
    <g transform="translate(0,0)">
      <text x="380" y="120" font-weight="600">RBAC</text>
      <text x="380" y="138" font-size="11.5" fill="#94A3B8">Granular role-based permissions</text>
    </g>
    <g>
      <text x="380" y="190" font-weight="600">Authentication</text>
      <text x="380" y="208" font-size="11.5" fill="#94A3B8">Verified identity for every user</text>
    </g>
    <g>
      <text x="380" y="260" font-weight="600">Encryption</text>
      <text x="380" y="278" font-size="11.5" fill="#94A3B8">Data secured at rest and in transit</text>
    </g>
  </g>
  <line x1="395" y1="113" x2="540" y2="140" stroke="#1E293B" stroke-width="1.3"/>
  <line x1="395" y1="183" x2="540" y2="190" stroke="#1E293B" stroke-width="1.3"/>
  <line x1="395" y1="253" x2="540" y2="240" stroke="#1E293B" stroke-width="1.3"/>

  <!-- right labels -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#E2E8F0" text-anchor="start">
    <g>
      <text x="820" y="120" font-weight="600">Secure APIs</text>
      <text x="820" y="138" font-size="11.5" fill="#94A3B8">Hardened endpoints &amp; rate limits</text>
    </g>
    <g>
      <text x="820" y="190" font-weight="600">Backups</text>
      <text x="820" y="208" font-size="11.5" fill="#94A3B8">Automated, versioned recovery</text>
    </g>
    <g>
      <text x="820" y="260" font-weight="600">Data Protection</text>
      <text x="820" y="278" font-size="11.5" fill="#94A3B8">Compliant data governance</text>
    </g>
  </g>
  <line x1="805" y1="113" x2="660" y2="140" stroke="#1E293B" stroke-width="1.3"/>
  <line x1="805" y1="183" x2="660" y2="190" stroke="#1E293B" stroke-width="1.3"/>
  <line x1="805" y1="253" x2="660" y2="240" stroke="#1E293B" stroke-width="1.3"/>
</svg>

<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="#0B1220"/>

  <g font-family="Helvetica, Arial, sans-serif">
    <!-- Security First -->
    <g transform="translate(10,20)">
      <rect width="380" height="170" rx="16" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <circle cx="50" cy="56" r="26" fill="url(#iconbg)"/>
      <path d="M50 38 L66 45 V58 C66 70 58 78 50 82 C42 78 34 70 34 58 V45 Z" fill="none" stroke="url(#brand)" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M43 58 L48 64 L58 50" fill="none" stroke="#3B82F6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="50" font-size="18" font-weight="700" fill="#F1F5F9">Security First</text>
      <text x="92" y="76" font-size="12.5" fill="#94A3B8">
        <tspan x="92" dy="0">Role-based access, encryption</tspan>
        <tspan x="92" dy="18">and audit trails by default</tspan>
      </text>
    </g>

    <!-- Cloud Native -->
    <g transform="translate(410,20)">
      <rect width="380" height="170" rx="16" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <circle cx="50" cy="56" r="26" fill="url(#iconbg)"/>
      <path d="M34 70 a15 15 0 0 1 4 -29.5 a19 19 0 0 1 36 -5.5 a16 16 0 0 1 5.5 35 Z" fill="none" stroke="url(#brand)" stroke-width="2.6" stroke-linejoin="round"/>
      <text x="92" y="50" font-size="18" font-weight="700" fill="#F1F5F9">Cloud Native</text>
      <text x="92" y="76" font-size="12.5" fill="#94A3B8">
        <tspan x="92" dy="0">Built on managed cloud</tspan>
        <tspan x="92" dy="18">services from day one</tspan>
      </text>
    </g>

    <!-- Scalable Architecture -->
    <g transform="translate(810,20)">
      <rect width="380" height="170" rx="16" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <circle cx="50" cy="56" r="26" fill="url(#iconbg)"/>
      <rect x="38" y="60" width="8" height="14" fill="url(#brand)"/>
      <rect x="48" y="50" width="8" height="24" fill="url(#brand)"/>
      <rect x="58" y="38" width="8" height="36" fill="#3B82F6"/>
      <text x="92" y="50" font-size="18" font-weight="700" fill="#F1F5F9">Scalable Architecture</text>
      <text x="92" y="76" font-size="12.5" fill="#94A3B8">
        <tspan x="92" dy="0">Grows from one campus to</tspan>
        <tspan x="92" dy="18">an entire institution network</tspan>
      </text>
    </g>

    <!-- Modern UX -->
    <g transform="translate(10,210)">
      <rect width="380" height="170" rx="16" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <circle cx="50" cy="56" r="26" fill="url(#iconbg)"/>
      <rect x="36" y="40" width="28" height="32" rx="4" fill="none" stroke="url(#brand)" stroke-width="2.4"/>
      <circle cx="50" cy="56" r="6" fill="none" stroke="#3B82F6" stroke-width="2.2"/>
      <text x="92" y="50" font-size="18" font-weight="700" fill="#F1F5F9">Modern User Experience</text>
      <text x="92" y="76" font-size="12.5" fill="#94A3B8">
        <tspan x="92" dy="0">Clean, intuitive interfaces</tspan>
        <tspan x="92" dy="18">across every product</tspan>
      </text>
    </g>

    <!-- Enterprise Reliability -->
    <g transform="translate(410,210)">
      <rect width="380" height="170" rx="16" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <circle cx="50" cy="56" r="26" fill="url(#iconbg)"/>
      <circle cx="50" cy="56" r="16" fill="none" stroke="url(#brand)" stroke-width="2.6"/>
      <path d="M50 48 V56 L56 60" fill="none" stroke="#3B82F6" stroke-width="2.4" stroke-linecap="round"/>
      <text x="92" y="50" font-size="18" font-weight="700" fill="#F1F5F9">Enterprise Reliability</text>
      <text x="92" y="76" font-size="12.5" fill="#94A3B8">
        <tspan x="92" dy="0">High availability with</tspan>
        <tspan x="92" dy="18">automated backups</tspan>
      </text>
    </g>

    <!-- Mobile First -->
    <g transform="translate(810,210)">
      <rect width="380" height="170" rx="16" fill="#111A2E" stroke="#1E293B" stroke-width="1.5"/>
      <circle cx="50" cy="56" r="26" fill="url(#iconbg)"/>
      <rect x="40" y="36" width="20" height="40" rx="5" fill="none" stroke="url(#brand)" stroke-width="2.4"/>
      <line x1="40" y1="68" x2="60" y2="68" stroke="#3B82F6" stroke-width="2.2"/>
      <text x="92" y="50" font-size="18" font-weight="700" fill="#F1F5F9">Mobile First Design</text>
      <text x="92" y="76" font-size="12.5" fill="#94A3B8">
        <tspan x="92" dy="0">Every workflow designed</tspan>
        <tspan x="92" dy="18">for the smallest screen first</tspan>
      </text>
    </g>
  </g>
</svg>

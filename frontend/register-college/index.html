<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register College | CampusOne</title>
  <meta name="description" content="Register your college with CampusOne and create your digital campus in minutes.">

  <link rel="icon" href="../../assets/favicon.png">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#2563eb,#0ea5e9);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:560px;
      background:#fff;
      border-radius:24px;
      padding:32px;
      box-shadow:0 20px 60px rgba(0,0,0,.15);
    }

    .brand{
      text-align:center;
      margin-bottom:28px;
    }

    .brand img{
      width:72px;
      margin-bottom:12px;
    }

    .brand h1{
      color:#111827;
      font-size:28px;
      margin-bottom:8px;
    }

    .brand p{
      color:#6b7280;
      font-size:14px;
      line-height:1.6;
    }

    .form-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
      color:#374151;
    }

    input{
      width:100%;
      padding:14px 16px;
      border:1px solid #d1d5db;
      border-radius:12px;
      font-size:15px;
      outline:none;
    }

    input:focus{
      border-color:#2563eb;
    }

    button{
      width:100%;
      border:none;
      border-radius:12px;
      padding:15px;
      background:linear-gradient(135deg,#2563eb,#0ea5e9);
      color:#fff;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      margin-top:8px;
    }

    .footer{
      margin-top:18px;
      text-align:center;
      font-size:13px;
      color:#6b7280;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="brand">
      <img src="../../assets/logo-icon.png" alt="CampusOne">
      <h1>College Registration</h1>
      <p>
        Join CampusOne and transform your institution into a modern digital campus.
      </p>
    </div>

    <form id="collegeForm">

      <div class="form-group">
        <label>College Name</label>
        <input type="text" placeholder="Enter college name" required>
      </div>

      <div class="form-group">
        <label>Principal Name</label>
        <input type="text" placeholder="Enter principal name" required>
      </div>

      <div class="form-group">
        <label>Official Email</label>
        <input type="email" placeholder="college@example.com" required>
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" placeholder="Enter mobile number" required>
      </div>

      <div class="form-group">
        <label>Student Strength</label>
        <input type="number" placeholder="e.g. 2500" required>
      </div>

      <button type="submit">
        Submit Registration Request
      </button>

    </form>

    <div class="footer">
      CampusOne • Smart Campus Management Platform
    </div>

  </div>

</body>
</html>
